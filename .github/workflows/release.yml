name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_web:
        description: 'Deploy web app to Vercel'
        type: boolean
        default: true
      build_tauri:
        description: 'Build Tauri desktop apps'
        type: boolean
        default: true
      build_android:
        description: 'Build Android'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  deploy_web:
    name: Deploy web app to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.deploy_web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --archive=tgz --token "$VERCEL_TOKEN"

  build_tauri:
    name: Build Tauri desktop apps
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || inputs.build_tauri
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Build Tauri app
        working-directory: web
        run: npm run tauri:build

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p dist
          DEB_FILE="$(find web/src-tauri/target/release/bundle -type f -name '*.deb' | head -n 1)"
          APPIMAGE_FILE="$(find web/src-tauri/target/release/bundle -type f -name '*.AppImage' | head -n 1)"
          RPM_FILE="$(find web/src-tauri/target/release/bundle -type f -name '*.rpm' | head -n 1)"
          test -n "$DEB_FILE"
          test -n "$APPIMAGE_FILE"
          test -n "$RPM_FILE"
          cp "$DEB_FILE" "dist/QRCrafter-${TAG}-linux.deb"
          cp "$APPIMAGE_FILE" "dist/QRCrafter-${TAG}-linux.AppImage"
          cp "$RPM_FILE" "dist/QRCrafter-${TAG}-linux.rpm"

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $msiFile = Get-ChildItem -Path "web/src-tauri/target/release/bundle" -Recurse -Filter *.msi | Select-Object -First 1
          $exeFile = Get-ChildItem -Path "web/src-tauri/target/release/bundle" -Recurse -Filter *.exe |
            Where-Object { $_.FullName -notmatch "updater" } |
            Select-Object -First 1

          if (-not $msiFile) { throw "MSI artifact not found." }
          if (-not $exeFile) { throw "EXE artifact not found." }

          Copy-Item $msiFile.FullName "dist/QRCrafter-$env:TAG-windows.msi"
          Copy-Item $exeFile.FullName "dist/QRCrafter-$env:TAG-windows.exe"

      - name: Collect macOS artifacts
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          DMG_FILE="$(find web/src-tauri/target/release/bundle -type f -name '*.dmg' | head -n 1)"
          test -n "$DMG_FILE"
          cp "$DMG_FILE" "dist/QRCrafter-${TAG}-macos.dmg"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: dist/*

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.build_android
    env:
      TAG: ${{ github.ref_name }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install root dependencies
        run: npm install

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      - name: Create gradle.properties
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "MYAPP_RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build Android release artifacts
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore

      - name: Sign Android artifacts
        shell: bash
        run: |
          mkdir -p dist

          UNSIGNED_APK="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          UNSIGNED_AAB="$(find android/app/build/outputs/bundle/release -type f -name '*.aab' | head -n 1)"

          test -n "$UNSIGNED_APK"
          test -n "$UNSIGNED_AAB"

          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"

          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" dist/aligned.apk
          "$APKSIGNER" sign \
            --ks android/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out "dist/QRCrafter-${TAG}-android.apk" \
            dist/aligned.apk

          jarsigner \
            -keystore android/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$UNSIGNED_AAB" "$KEY_ALIAS"

          cp "$UNSIGNED_AAB" "dist/QRCrafter-${TAG}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            dist/QRCrafter-*-android.apk
            dist/QRCrafter-*-android.aab

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_ios
    env:
      TAG: ${{ github.ref_name }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Import Apple certificate
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        shell: bash
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -convert json -o - - | python3 -c "import sys,json; print(json.load(sys.stdin)['UUID'])")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Build and archive iOS app
        shell: bash
        run: |
          IOS_WORKSPACE="ios/QRCrafter.xcworkspace"
          IOS_PROJECT="ios/QRCrafter.xcodeproj"
          ARCHIVE_PATH="$RUNNER_TEMP/QRCrafter.xcarchive"

          if [ -d "$IOS_WORKSPACE" ]; then
            xcodebuild \
              -workspace "$IOS_WORKSPACE" \
              -scheme QRCrafter \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination "generic/platform=iOS" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Automatic \
              clean archive
          else
            xcodebuild \
              -project "$IOS_PROJECT" \
              -scheme QRCrafter \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination "generic/platform=iOS" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Automatic \
              clean archive
          fi

      - name: Export IPA
        shell: bash
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/QRCrafter.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/ipa"
          EXPORT_OPTIONS="ios/ExportOptions.plist"

          if [ -f "$EXPORT_OPTIONS" ]; then
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportOptionsPlist "$EXPORT_OPTIONS" \
              -exportPath "$EXPORT_DIR"

            mkdir -p dist
            IPA_SRC=$(find "$EXPORT_DIR" -name '*.ipa' | head -n 1)
            test -n "$IPA_SRC" || { echo "Error: No IPA file found in $EXPORT_DIR"; exit 1; }
            cp "$IPA_SRC" "dist/QRCrafter-${TAG}-ios.ipa"
          else
            echo "ExportOptions.plist not found; packaging xcarchive instead."
            mkdir -p dist
            ditto -c -k --sequesterRsrc --keepParent \
              "$ARCHIVE_PATH" \
              "dist/QRCrafter-${TAG}-ios.xcarchive.zip"
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/QRCrafter-*-ios.*

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && !cancelled()
    needs: [deploy_web, build_tauri, build_android, build_ios]
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum QRCrafter-* > checksums.txt

      - name: Generate release body
        shell: bash
        run: |
          {
            echo "## Downloads"
            echo
            echo "| Platform | File |"
            echo "| --- | --- |"
            
            for f in QRCrafter-*-android.*; do
              [[ -f "$f" ]] && echo "| Android | [\`$f\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/$f) |"
            done
            
            for f in QRCrafter-*-ios.*; do
              [[ -f "$f" ]] && echo "| iOS | [\`$f\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/$f) |"
            done
            
            for f in QRCrafter-*-linux.*; do
              [[ -f "$f" ]] && echo "| Linux | [\`$f\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/$f) |"
            done
            
            for f in QRCrafter-*-windows.*; do
              [[ -f "$f" ]] && echo "| Windows | [\`$f\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/$f) |"
            done
            
            for f in QRCrafter-*-macos.*; do
              [[ -f "$f" ]] && echo "| macOS | [\`$f\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/$f) |"
            done
            
            echo
            echo "## SHA256 Checksums"
            echo
            echo '```text'
            cat checksums.txt
            echo '```'
          } > RELEASE_BODY.md
        working-directory: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: release-assets/RELEASE_BODY.md
          files: |
            release-assets/QRCrafter-*-android.apk
            release-assets/QRCrafter-*-android.aab
            release-assets/QRCrafter-*-ios.ipa
            release-assets/QRCrafter-*-ios.xcarchive.zip
            release-assets/QRCrafter-*-linux.deb
            release-assets/QRCrafter-*-linux.rpm
            release-assets/QRCrafter-*-linux.AppImage
            release-assets/QRCrafter-*-windows.msi
            release-assets/QRCrafter-*-windows.exe
            release-assets/QRCrafter-*-macos.dmg
            release-assets/checksums.txt
